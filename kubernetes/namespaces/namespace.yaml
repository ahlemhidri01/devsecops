apiVersion: v1
kind: Namespace
metadata:
  name: securebank-prod
  labels:
    name: securebank-prod
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: securebank-prod-quota
  namespace: securebank-prod
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: securebank-prod-limits
  namespace: securebank-prod
spec:
  limits:
    - default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 250m
        memory: 256Mi
      type: Container
