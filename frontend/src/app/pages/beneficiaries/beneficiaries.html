<header>
      <h1>Beneficiaries 👥</h1>
      <div class="date">{{ currentDate }}</div>
    </header>

    <div class="beneficiaries-list glass-card">
      <h3>Registered Beneficiaries</h3>
      <div class="bene-item" *ngFor="let b of beneficiaries">
        <div class="bene-avatar">{{ b.avatar }}</div>
        <div class="bene-info">
          <strong>{{ b.name }}</strong>
          <span>{{ b.bank }}</span>
          <code>{{ b.iban }}</code>
        </div>
        <button class="btn-send" (click)="openSendMoneyModal(b)">Send Money</button>
      </div>
    </div>

    <!-- Send Money Modal -->
    <div class="modal-overlay" *ngIf="showModal">
      <div class="modal-content glass-card">
        <h3>Send Money to {{ selectedBeneficiary?.name }}</h3>
        <p class="modal-subtitle">IBAN: {{ selectedBeneficiary?.iban }}</p>
        
        <form (ngSubmit)="sendMoney()">
          <div class="input-group">
            <label for="amount">Amount (€)</label>
            <input type="number" id="amount" [(ngModel)]="transferAmount" name="amount" min="1" required placeholder="0.00">
          </div>
          <div class="input-group">
            <label for="description">Description (optional)</label>
            <input type="text" id="description" [(ngModel)]="transferDescription" name="description" placeholder="e.g. Rent, Dinner...">
          </div>
          
          <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>
          <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>

          <div class="modal-actions">
            <button type="button" class="btn-cancel" (click)="closeModal()" [disabled]="isTransferring">Cancel</button>
            <button type="submit" class="btn-primary" [disabled]="isTransferring || !transferAmount">
              {{ isTransferring ? 'Processing...' : 'Confirm Transfer' }}
            </button>
          </div>
        </form>
      </div>
    </div>
